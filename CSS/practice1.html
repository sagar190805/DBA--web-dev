<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #P{
        background-color: aqua;
        height: 400px;
        width: 400px;
        border:2px solid black;
        
    }
    #c{
        background-color: aquamarine;
        height: 200px;
        width: 200px;
        margin:50px;
        padding:50px;
        border:2px solid black;
    }
    #pc{
        background-color: beige;
        height:150px;
        width:150px;
        margin:30px;
        border:2px solid black;
    }
    #pcc{
        background-color:brown;
        height:100px;
        width:100px;
        margin:20px;
        border:2px solid black;
    }
    #pccc{
        background-color: red;
        height:50px;
        width:50px;
        margin:15px;
        padding:10%;
        border:2px solid black;
    }
    #d{
        background-color:black;
        height:25px;
        width:25px;
        margin:5px;
        border:2px solid black;
    }
    
</style>
<body>
    <!-- div is a container containing content  -->
     <!-- select id by #.
      select tag by direct tag no prefix.
      select  class by .(dot).
      Margin: external space from external or parent .
      Padding: internal size or space of a div or child. 
      class for apllying to whole  class or div parent div
      id is for individual .
      priority of id >> class.
      -->
    <div id="P" >
        <div id ="c" >
        <div id="pc">
            <div id="pcc">
                <div id="pccc">
                    <div id="d"></div>
                </div>
            </div>
        </div>
    </div>
    </div>
</body>
</html>
